<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->
    <link rel="stylesheet" href="./style.css" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap"
      rel="stylesheet"
    />
    <title>Frontend Mentor | Article preview component</title>
  </head>
  <body>
    <article class="card" title="article card" aria-label="article card">
      <img class="card__image" alt="" src="./images/drawers.jpg" />
      <div class="[ card__content ] [ flow ]">
        <p class="card__title">
          Shift the overall look and feel by adding these wonderful touches to
          furniture in your home
        </p>
        <p class="card__text">
          Ever been in a room and felt like something was missing? Perhaps it
          felt slightly bare and uninviting. I’ve got some simple tips to help
          you make any room feel complete.
        </p>
        <div class="card__footer">
          <img class="card__avatar" alt="" src="./images/avatar-michelle.jpg" />
          <div class="card__author">
            <h2 class="card__author-name">Michelle Appleton</h2>
            <!-- <p class="card__author-date">28 Jun 2020</p> -->
            <time datetime="2020-06-28" class="card__author-date"
              >28 Jun 2020</time
            >
          </div>
          <button class="card__share-button" role="button" aria-label="Share">
            <img
              class="card__share-icon"
              alt=""
              src="./images/icon-share.svg"
            />
            <span class="visually-hidden">Share</span>
          </button>
        </div>
      </div>
    </article>
  </body>
</html>
